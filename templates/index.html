<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package.XML Visualizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Package.XML Visualizer</h1>
            <p>Visualize ROS and non-ROS package dependencies</p>
        </div>

        <div class="input-section">
            <input
                type="text"
                id="urlInput"
                class="url-input"
                placeholder="https://github.com/user/repo/blob/main/package.xml"
                value="https://github.com/BehaviorTree/BehaviorTree.CPP/blob/master/package.xml"
            >
            <button id="visualizeBtn" class="visualize-btn">Visualize</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            Loading...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="content" style="display: none;">
            <div class="package-header">
                <div class="package-info">
                    <div class="package-title-row">
                        <h2 id="packageName"></h2>
                        <span class="stat-ros" id="rosCount">-</span>
                        <span class="stat-label">ROS dependencies</span>
                    </div>
                    <p id="packageDescription"></p>
                </div>
            </div>

            <div class="tree-section">
                <div id="tree"></div>
            </div>
        </div>
    </div>

    <script>
        // Global state for expandable tree
        let expandedState = {};
        let visitedPackages = new Set();

        document.getElementById('visualizeBtn').addEventListener('click', visualize);
        document.getElementById('urlInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                visualize();
            }
        });

        async function visualize() {
            const url = document.getElementById('urlInput').value.trim();

            if (!url) {
                showError('Please enter a GitHub URL');
                return;
            }

            showLoading(true);
            hideError();
            // Reset state for new visualization
            expandedState = {};
            visitedPackages.clear();

            try {
                const response = await fetch('/api/visualize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to visualize');
                }

                displayResults(data);
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(data) {
            const pkg = data.package;
            const graph = data.graph;

            document.getElementById('packageName').textContent = pkg.name + ' v' + pkg.version;
            document.getElementById('packageDescription').textContent = pkg.description || 'No description';
            document.getElementById('rosCount').textContent = graph.stats.ros_count;

            renderTree(graph);
            document.getElementById('content').style.display = 'flex';
        }

        function renderTree(graphData) {
            const treeContainer = document.getElementById('tree');
            treeContainer.innerHTML = '';

            const nodes = graphData.nodes;
            const mainNode = nodes[0];
            const depNodes = nodes.slice(1);

            // Create root
            const root = document.createElement('div');
            root.className = 'tree-item root';
            root.innerHTML = `<div class="tree-label">${mainNode.label}</div>`;

            const depContainer = document.createElement('div');
            depContainer.className = 'tree-children';

            // Separate by ROS type and dependency type
            const rosNodes = depNodes.filter(n => n.color === '#d32f2f');
            const nonRosNodes = depNodes.filter(n => n.color === '#1976d2');

            // Helper to get type label
            function getTypeLabel(type) {
                const typeLabels = {
                    'depend': 'build & runtime',
                    'exec_depend': 'runtime only',
                    'test_depend': 'test only',
                    'buildtool_depend': 'build tool',
                    'build_depend': 'build only',
                    'run_depend': 'runtime'
                };
                return typeLabels[type] || type;
            }

            // Group nodes by type
            function groupByType(nodeArray) {
                const groups = {};
                nodeArray.forEach(node => {
                    const type = node.type || 'depend';
                    if (!groups[type]) groups[type] = [];
                    groups[type].push(node);
                });
                return groups;
            }

            // Create node element with expand icon for ROS packages
            function createNodeElement(node, typeLabel) {
                const item = document.createElement('div');
                item.className = node.color === '#d32f2f' ? 'tree-item ros-dep' : 'tree-item non-ros-dep';
                item.dataset.packageName = node.label;

                let labelHtml = `<div class="tree-label">${node.label}</div>`;

                // Add expand icon for ROS packages
                let expandHtml = '';
                if (node.color === '#d32f2f') {
                    expandHtml = `<span class="expand-icon" data-package="${node.label}">+</span>`;
                }

                // Add distro link if available
                let distroLinkHtml = '';
                if (node.in_humble && node.distro_link) {
                    distroLinkHtml = `<a href="${node.distro_link}" target="_blank" class="distro-link" title="View in ROS Humble distribution">↗</a>`;
                }

                // Add repo link if available
                let repoLinkHtml = '';
                if (node.repo_url) {
                    repoLinkHtml = `<a href="${node.repo_url}" target="_blank" class="repo-link" title="View source repository">📁</a>`;
                }

                item.innerHTML = `
                    <div class="tree-connector"></div>
                    <div class="tree-dot ${node.color === '#d32f2f' ? 'ros' : 'non-ros'}"></div>
                    <div class="tree-content">
                        <div class="tree-label-wrapper">
                            ${expandHtml}
                            ${labelHtml}
                            ${repoLinkHtml}
                            ${distroLinkHtml}
                        </div>
                        <div class="tree-type">${typeLabel}</div>
                    </div>
                    <div class="tree-children-container" style="display:none;"></div>
                `;

                // Add click handler for expand icon
                if (node.color === '#d32f2f') {
                    const expandIcon = item.querySelector('.expand-icon');
                    expandIcon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleExpand(item, node.label);
                    });
                }

                return item;
            }

            // Add ROS dependencies only
            if (rosNodes.length > 0) {
                const rosGroups = groupByType(rosNodes);
                const typeOrder = ['depend', 'buildtool_depend', 'exec_depend', 'test_depend', 'build_depend', 'run_depend'];

                typeOrder.forEach(typeKey => {
                    if (!rosGroups[typeKey]) return;

                    const typeNodes = rosGroups[typeKey];
                    typeNodes.forEach((node, index) => {
                        const typeLabel = getTypeLabel(node.type || 'depend');
                        const item = createNodeElement(node, typeLabel);
                        depContainer.appendChild(item);
                    });
                });
            }

            root.appendChild(depContainer);
            treeContainer.appendChild(root);
        }

        async function toggleExpand(packageNode, packageName) {
            const expandIcon = packageNode.querySelector('.expand-icon');
            const childrenContainer = packageNode.querySelector('.tree-children-container');
            const isExpanded = expandedState[packageName];

            if (isExpanded) {
                // Collapse
                childrenContainer.style.display = 'none';
                expandIcon.textContent = '+';
                expandedState[packageName] = false;
            } else {
                // Expand
                if (childrenContainer.children.length === 0) {
                    // Load children if not already loaded
                    showLoadingSpinner(childrenContainer);

                    try {
                        const response = await fetch('/api/get-dependencies', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                package_name: packageName,
                                visited: Array.from(visitedPackages)
                            })
                        });

                        const data = await response.json();

                        if (!response.ok || !data.success) {
                            showError('Failed to load dependencies for ' + packageName);
                            childrenContainer.innerHTML = '';
                            return;
                        }

                        // Add package to visited set
                        visitedPackages.add(packageName);

                        // Render dependencies
                        renderDependencies(childrenContainer, data.dependencies, packageName);
                    } catch (error) {
                        childrenContainer.innerHTML = `<div style="color: red; padding: 5px;">Error loading dependencies</div>`;
                        console.error('Error fetching dependencies:', error);
                    }
                }

                childrenContainer.style.display = 'block';
                expandIcon.textContent = '-';
                expandedState[packageName] = true;
            }
        }

        function showLoadingSpinner(container) {
            container.innerHTML = '<div class="loading-spinner-small"></div>';
        }

        function renderDependencies(container, dependencies, parentPackage) {
            container.innerHTML = '';

            if (dependencies.length === 0) {
                container.innerHTML = '<div style="padding: 5px; font-style: italic; color: #666;">No ROS dependencies</div>';
                return;
            }

            // Helper to get type label
            function getTypeLabel(type) {
                const typeLabels = {
                    'depend': 'build & runtime',
                    'exec_depend': 'runtime only',
                    'test_depend': 'test only',
                    'buildtool_depend': 'build tool',
                    'build_depend': 'build only',
                    'run_depend': 'runtime'
                };
                return typeLabels[type] || type;
            }

            dependencies.forEach(dep => {
                const depItem = document.createElement('div');
                depItem.className = 'tree-item ros-dep tree-child';
                depItem.dataset.packageName = dep.name;

                // Expand icon for nested ROS packages
                const expandIcon = visitedPackages.has(dep.name)
                    ? '<span class="expand-icon-disabled" title="Already visited (circular dependency)">●</span>'
                    : `<span class="expand-icon" data-package="${dep.name}">+</span>`;

                // Repository link
                let repoLink = '';
                if (dep.repo_url) {
                    repoLink = `<a href="${dep.repo_url}" target="_blank" class="repo-link" title="View source repository">📁</a>`;
                }

                // Distro link
                let distroLink = '';
                if (dep.distro_link) {
                    distroLink = `<a href="${dep.distro_link}" target="_blank" class="distro-link" title="View in ROS Humble distribution">↗</a>`;
                }

                // Source packages tag (for multi-package repos)
                let sourceTag = '';
                if (dep.source_packages && dep.source_packages.length > 0) {
                    const sourceText = dep.source_packages.join(', ');
                    sourceTag = `<span class="source-tag" title="Declared in package(s): ${sourceText}">${sourceText}</span>`;
                }

                depItem.innerHTML = `
                    <div class="tree-connector"></div>
                    <div class="tree-dot ros"></div>
                    <div class="tree-content">
                        <div class="tree-label-wrapper">
                            ${expandIcon}
                            <div class="tree-label">${dep.name}</div>
                            ${repoLink}
                            ${distroLink}
                        </div>
                        <div class="tree-type">${getTypeLabel(dep.type)}</div>
                        ${sourceTag}
                    </div>
                    <div class="tree-children-container" style="display:none;"></div>
                `;

                // Add click handler for expand icon if not circular
                if (!visitedPackages.has(dep.name)) {
                    const expandIc = depItem.querySelector('.expand-icon');
                    expandIc.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleExpand(depItem, dep.name);
                    });
                }

                container.appendChild(depItem);
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('content').style.display = 'none';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // Load on startup
        window.addEventListener('load', visualize);
    </script>
</body>
</html>
